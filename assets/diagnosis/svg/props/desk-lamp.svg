<svg xmlns="http://www.w3.org/2000/svg" width="280" height="260" viewBox="0 0 280 260" fill="none">
<defs>
  <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000" flood-opacity="0.58"/></filter>
  <filter id="partShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/></filter>
  <filter id="warmGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12" result="blur"/><feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 .72 0 0 .52  0 0 .28 0 .10  0 0 0 .9 0"/><feBlend in2="SourceGraphic" mode="screen"/></filter>
  <linearGradient id="darkMetal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6a5d4d"/><stop offset="0.26" stop-color="#2e2822"/><stop offset="0.68" stop-color="#171411"/><stop offset="1" stop-color="#050504"/></linearGradient>
  <linearGradient id="armMetal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7a6752"/><stop offset="0.28" stop-color="#342820"/><stop offset="1" stop-color="#070605"/></linearGradient>
  <linearGradient id="shadeShell" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6f6455"/><stop offset="0.3" stop-color="#2b241e"/><stop offset="0.78" stop-color="#11100e"/><stop offset="1" stop-color="#030303"/></linearGradient>
  <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff0b7"/><stop offset="0.34" stop-color="#c58a3a"/><stop offset="0.72" stop-color="#5b3413"/><stop offset="1" stop-color="#241105"/></linearGradient>
  <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a4136"/><stop offset="0.65" stop-color="#1b1714"/><stop offset="1" stop-color="#050505"/></linearGradient>
  <radialGradient id="bulb" cx="45%" cy="35%" r="60%"><stop offset="0" stop-color="#ffffff"/><stop offset="0.25" stop-color="#fff4bc"/><stop offset="0.6" stop-color="#e7a243"/><stop offset="1" stop-color="#5b2c0b"/></radialGradient>
  <radialGradient id="lightPool" cx="44%" cy="34%" r="70%"><stop offset="0" stop-color="#fff5bf" stop-opacity="0.5"/><stop offset="0.55" stop-color="#ffc65a" stop-opacity="0.16"/><stop offset="1" stop-color="#ffc65a" stop-opacity="0"/></radialGradient>
</defs>

<!-- subtle light cone/pool -->
<ellipse cx="74" cy="132" rx="74" ry="44" fill="url(#lightPool)"/>
<path d="M43 123 C28 146 19 177 18 216 H144 C134 174 117 143 91 122Z" fill="#ffc65a" opacity="0.08"/>

<!-- heavy base and vertical pole like the reference photo -->
<ellipse cx="207" cy="242" rx="56" ry="9" fill="#000" opacity="0.36"/>
<rect x="151" y="222" width="112" height="23" rx="10" fill="url(#baseGrad)" stroke="#6f5639" stroke-width="1.4" filter="url(#shadow)"/>
<ellipse cx="207" cy="222" rx="56" ry="12" fill="#3a3027" stroke="#796247" stroke-width="1.2"/>
<rect x="201" y="98" width="12" height="126" rx="6" fill="url(#darkMetal)" stroke="#796247" stroke-width="1"/>
<path d="M207 100 V220" stroke="#8b7861" stroke-width="1" opacity="0.5"/>

<!-- sliding collar block with side knobs -->
<g filter="url(#partShadow)">
  <rect x="190" y="83" width="34" height="48" rx="5" fill="url(#darkMetal)" stroke="#7c6549" stroke-width="1.1"/>
  <ellipse cx="187" cy="107" rx="6" ry="10" fill="#19130f" stroke="#6f5639"/>
  <ellipse cx="227" cy="107" rx="6" ry="10" fill="#19130f" stroke="#6f5639"/>
</g>

<!-- two-section articulated arm, clean and mechanical -->
<g stroke-linecap="round" stroke-linejoin="round" filter="url(#partShadow)">
  <path d="M207 85 L171 41" stroke="#17120e" stroke-width="13"/>
  <path d="M197 90 L161 46" stroke="#32271f" stroke-width="13"/>
  <path d="M165 43 L101 69" stroke="#17120e" stroke-width="13"/>
  <path d="M159 54 L96 79" stroke="#332820" stroke-width="13"/>
  <path d="M199 88 L163 45" stroke="#8b765f" stroke-width="1.5" opacity="0.6"/>
  <path d="M161 50 L99 76" stroke="#8b765f" stroke-width="1.5" opacity="0.6"/>
</g>

<!-- pivots with screw slots -->
<g filter="url(#partShadow)">
  <circle cx="207" cy="86" r="16" fill="url(#armMetal)" stroke="#070605" stroke-width="2"/>
  <path d="M200 86 H214" stroke="#9c8b73" stroke-width="2" stroke-linecap="round"/>
  <circle cx="163" cy="47" r="16" fill="url(#armMetal)" stroke="#070605" stroke-width="2"/>
  <path d="M156 47 H170" stroke="#9c8b73" stroke-width="2" stroke-linecap="round"/>
  <circle cx="99" cy="75" r="15" fill="url(#armMetal)" stroke="#070605" stroke-width="2"/>
  <path d="M92 75 H106" stroke="#9c8b73" stroke-width="2" stroke-linecap="round"/>
</g>

<!-- short neck into shade -->
<path d="M92 82 L79 95" stroke="#241c15" stroke-width="12" stroke-linecap="round" filter="url(#partShadow)"/>
<path d="M92 82 L79 95" stroke="#8b765f" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>

<!-- dome shade, black outside, brass inside, transparent bulb -->
<g transform="rotate(-13 73 112)" filter="url(#shadow)">
  <path d="M16 107 C26 66 65 43 111 50 C136 54 154 68 163 91 C119 102 62 111 16 107Z" fill="url(#shadeShell)" stroke="#6e5338" stroke-width="2"/>
  <path d="M23 105 C62 115 121 106 160 91 C162 100 158 108 147 112 C107 126 57 129 25 115 C18 112 16 109 23 105Z" fill="url(#brass)" stroke="#7a552f" stroke-width="1.6"/>
  <path d="M29 101 C43 73 77 57 113 61" stroke="#a08d72" stroke-width="1.4" opacity="0.48"/>
  <ellipse cx="89" cy="109" rx="18" ry="13" fill="url(#bulb)" opacity="0.92" filter="url(#warmGlow)"/>
  <path d="M78 111 C85 117 95 117 101 111" stroke="#8b5723" stroke-width="1" opacity="0.55"/>
</g>
</svg>
