<svg xmlns="http://www.w3.org/2000/svg" width="504" height="672" viewBox="0 0 504 672" fill="none">
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#000" flood-opacity="0.58"/></filter>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.42"/></filter>
  <filter id="paperLift" x="-15%" y="-15%" width="130%" height="135%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#3b210e" flood-opacity="0.22"/></filter>
  <linearGradient id="board" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7a4f2c"/><stop offset="0.45" stop-color="#4d2f19"/><stop offset="1" stop-color="#241308"/></linearGradient>
  <linearGradient id="boardEdge" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c3945c"/><stop offset="0.18" stop-color="#5e3a1e"/><stop offset="0.86" stop-color="#190d06"/><stop offset="1" stop-color="#9a6936"/></linearGradient>
  <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff8ea"/><stop offset="0.44" stop-color="#f1e3ca"/><stop offset="1" stop-color="#caa775"/></linearGradient>
  <linearGradient id="paper2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#efe1c7"/><stop offset="1" stop-color="#ba9560"/></linearGradient>
  <linearGradient id="clipMetal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f5e8cd"/><stop offset="0.16" stop-color="#b59a6f"/><stop offset="0.55" stop-color="#4f3c27"/><stop offset="1" stop-color="#17100a"/></linearGradient>
  <linearGradient id="clipHighlight" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff3d4"/><stop offset="1" stop-color="#8b7653"/></linearGradient>
  <radialGradient id="coffee" cx="50%" cy="50%" r="60%"><stop offset="0" stop-color="#a97a44" stop-opacity="0"/><stop offset="0.66" stop-color="#a97a44" stop-opacity="0.13"/><stop offset="0.9" stop-color="#8c5c2d" stop-opacity="0.34"/><stop offset="1" stop-color="#8c5c2d" stop-opacity="0"/></radialGradient>
</defs>

<!-- board is slightly larger than the paper so the clip never covers gameplay text -->
<rect x="18" y="42" width="468" height="612" rx="20" fill="url(#boardEdge)" filter="url(#shadow)"/>
<rect x="30" y="54" width="444" height="588" rx="15" fill="url(#board)" stroke="#c39154" stroke-width="1.3"/>
<rect x="38" y="64" width="428" height="566" rx="11" fill="#2b1609" opacity="0.22"/>

<!-- paper stack, shifted down to create a non-overlap clip zone -->
<g filter="url(#paperLift)">
  <rect x="78" y="82" width="344" height="528" rx="3" fill="url(#paper2)" opacity="0.55" stroke="#9f7e52"/>
  <rect x="68" y="70" width="356" height="540" rx="3" fill="url(#paper2)" opacity="0.72" stroke="#b18b58"/>
  <rect x="80" y="60" width="356" height="540" rx="3" fill="url(#paper2)" opacity="0.92" stroke="#b18b58"/>
  <rect x="92" y="72" width="320" height="538" rx="4" fill="url(#paper)" stroke="#c1a072" stroke-width="1.2"/>
</g>

<!-- hardware clip is above the safe text zone, not on top of it -->
<g filter="url(#softShadow)">
  <path d="M171 33 H333 C347 33 356 43 356 57 V76 H148 V57 C148 43 157 33 171 33Z" fill="url(#clipMetal)" stroke="#2e2418" stroke-width="1.4"/>
  <rect x="185" y="49" width="134" height="19" rx="5" fill="url(#clipHighlight)" stroke="#fff3d1" stroke-width="1" opacity="0.92"/>
  <path d="M158 76 C194 96 310 96 346 76" stroke="#4c3925" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M174 77 C208 89 296 89 330 77" stroke="#d9c29b" stroke-width="1.15" opacity="0.5" stroke-linecap="round"/>
  <circle cx="252" cy="32" r="18" fill="#15100b" stroke="#d6c09b" stroke-width="3"/>
  <circle cx="252" cy="32" r="9" fill="#070504" stroke="#6c5a42"/>
</g>

<!-- small medical cross is anchored in the paper margin, away from question/answer content -->
<g opacity="0.9">
  <rect x="365" y="98" width="17" height="50" rx="2" fill="#c73931"/>
  <rect x="348" y="114" width="50" height="18" rx="2" fill="#c73931"/>
</g>

<!-- blank content-safe paper zones for DOM overlays. These are subtle shadows only, not labels. -->
<rect x="118" y="142" width="268" height="72" rx="10" fill="#fff8e8" opacity="0.18" stroke="#d5b47e" stroke-width="0.6"/>
<rect x="118" y="242" width="268" height="52" rx="8" fill="#fff8e8" opacity="0.08"/>
<rect x="118" y="315" width="268" height="52" rx="8" fill="#fff8e8" opacity="0.08"/>
<rect x="118" y="388" width="268" height="52" rx="8" fill="#fff8e8" opacity="0.08"/>
<rect x="118" y="461" width="268" height="52" rx="8" fill="#fff8e8" opacity="0.08"/>
<circle cx="335" cy="522" r="52" fill="url(#coffee)" opacity="0.95"/>
<path d="M122 565 H379" stroke="#7b5a34" stroke-width="1" opacity="0.14" stroke-linecap="round"/>

<!-- integration markers are comments only: content safe area x=112 y=126 w=280 h=404; button safe area x=124 y=548 w=256 h=52 -->
</svg>
