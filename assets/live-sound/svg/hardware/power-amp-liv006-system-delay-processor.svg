<svg xmlns="http://www.w3.org/2000/svg" width="940" height="260" viewBox="0 0 940 260" role="img" aria-label="LIV-006 crossover delay and aux zone rack">
<defs>
  <linearGradient id="rackFace" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#343535"/>
    <stop offset="0.48" stop-color="#222323"/>
    <stop offset="1" stop-color="#111214"/>
  </linearGradient>
  <linearGradient id="rackEdge" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#777"/>
    <stop offset="0.18" stop-color="#272727"/>
    <stop offset="1" stop-color="#060606"/>
  </linearGradient>
  <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#e0ddd0"/>
    <stop offset="0.22" stop-color="#71706a"/>
    <stop offset="0.52" stop-color="#202122"/>
    <stop offset="0.83" stop-color="#0b0c0d"/>
    <stop offset="1" stop-color="#7e7a70"/>
  </linearGradient>
  <linearGradient id="jackCup" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1e2021"/>
    <stop offset="0.45" stop-color="#060708"/>
    <stop offset="1" stop-color="#000"/>
  </linearGradient>
  <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.65"/>
  </filter>
  <filter id="systemGlow" x="-35%" y="-45%" width="170%" height="190%">
    <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#5fb7ff" flood-opacity="0.70"/>
  </filter>
  <filter id="delayGlow" x="-35%" y="-45%" width="170%" height="190%">
    <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#b68cff" flood-opacity="0.72"/>
  </filter>
  <filter id="zoneGlow" x="-35%" y="-45%" width="170%" height="190%">
    <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#56e0b2" flood-opacity="0.62"/>
  </filter>

  <style>
    @keyframes sfZoneMarch {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -56; }
    }

    @keyframes sfZoneBreathe {
      0%, 100% {
        opacity: .78;
        stroke-width: 1.6;
      }
      50% {
        opacity: 1;
        stroke-width: 2.4;
      }
    }

    @keyframes sfZoneScan {
      0%, 100% {
        opacity: .18;
        transform: translateX(-18px);
      }
      50% {
        opacity: .62;
        transform: translateX(18px);
      }
    }

    .sf-zone-box {
      stroke-dasharray: 18 10;
      animation:
        sfZoneMarch 1.8s linear infinite,
        sfZoneBreathe 2.4s ease-in-out infinite;
    }

    .sf-zone-scan {
      animation: sfZoneScan 2.2s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
      pointer-events: none;
    }
  </style>

</defs>

<rect x="4" y="6" width="932" height="248" rx="8" fill="url(#rackEdge)" filter="url(#shadow)"/>
<rect x="18" y="14" width="904" height="232" rx="5" fill="url(#rackFace)" stroke="#5e5e58" stroke-width="1.2"/>
<path d="M22 18H918" stroke="#7d7a70" stroke-opacity="0.5"/>
<path d="M22 242H918" stroke="#000" stroke-opacity="0.8"/>

<rect x="3" y="18" width="12" height="224" rx="5" fill="#111" stroke="#4e4e4a"/>
<rect x="925" y="18" width="12" height="224" rx="5" fill="#111" stroke="#4e4e4a"/>
<circle cx="9" cy="20" r="4.2" fill="#060606" stroke="#8c8a82" stroke-width="1"/>
<circle cx="9" cy="240" r="4.2" fill="#060606" stroke="#8c8a82" stroke-width="1"/>
<circle cx="931" cy="20" r="4.2" fill="#060606" stroke="#8c8a82" stroke-width="1"/>
<circle cx="931" cy="240" r="4.2" fill="#060606" stroke="#8c8a82" stroke-width="1"/>

<path d="M318 52V214" stroke="#9b9b92" stroke-width="1.2" opacity="0.7"/>
<path d="M626 52V214" stroke="#9b9b92" stroke-width="1.2" opacity="0.7"/>

<text x="160" y="50" text-anchor="middle" font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="800" fill="#e8e5da">CROSSOVER</text>
<text x="470" y="50" text-anchor="middle" font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="800" fill="#e8e5da">DELAY TOWER PROCESSOR</text>
<text x="760" y="50" text-anchor="middle" font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="800" fill="#e8e5da">AUX INPUTS</text>

<!-- Power-amp-style venting / hardware detail, neutral -->
<g opacity=".72">
  <rect class="sf-zone-box" x="55" y="78" width="210" height="34" rx="4" fill="#090a0b" stroke="#5fb7ff" stroke-width="1.8" filter="url(#systemGlow)" opacity=".96"/>
  <rect class="sf-zone-box" x="370" y="78" width="200" height="34" rx="4" fill="#090a0b" stroke="#b68cff" stroke-width="1.8" filter="url(#delayGlow)" opacity=".96"/>
  <rect class="sf-zone-box" x="670" y="78" width="190" height="34" rx="4" fill="#090a0b" stroke="#56e0b2" stroke-width="1.8" filter="url(#zoneGlow)" opacity=".96"/>
  <g stroke="#555b58" stroke-width="2">
    <path d="M74 94H246"/><path d="M74 102H246"/>
    <path d="M388 94H552"/><path d="M388 102H552"/>
    <path d="M688 94H842"/><path d="M688 102H842"/>
  </g>

  <g class="sf-zone-scan" stroke-width="2.5" stroke-linecap="round">
    <path d="M86 88H234" stroke="#5fb7ff"/>
    <path d="M400 88H540" stroke="#b68cff"/>
    <path d="M700 88H830" stroke="#56e0b2"/>
  </g>
</g>

<g font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif" text-anchor="middle" font-size="11" font-weight="800" fill="#e8e5da">
  <text x="94" y="190">L IN</text>
  <text x="214" y="190">R IN</text>
  <text x="470" y="190">INPUT</text>
  <text x="704" y="190">SUB IN</text>
  <text x="818" y="190">FILL IN</text>
</g>

<g class="processor-inputs" filter="url(#shadow)">
  <circle cx="94" cy="146" r="20" fill="url(#metal)" stroke="#050505" stroke-width="1.2"/>
  <circle cx="94" cy="146" r="17.2" fill="#121314" stroke="#817d72" stroke-width=".8"/>
  <circle cx="94" cy="146" r="14" fill="url(#jackCup)" stroke="#68645b" stroke-width=".9"/>
  <circle cx="88.5" cy="142.8" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>
  <circle cx="99.5" cy="142.8" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>
  <circle cx="94" cy="153" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>

  <circle cx="214" cy="146" r="20" fill="url(#metal)" stroke="#050505" stroke-width="1.2"/>
  <circle cx="214" cy="146" r="17.2" fill="#121314" stroke="#817d72" stroke-width=".8"/>
  <circle cx="214" cy="146" r="14" fill="url(#jackCup)" stroke="#68645b" stroke-width=".9"/>
  <circle cx="208.5" cy="142.8" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>
  <circle cx="219.5" cy="142.8" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>
  <circle cx="214" cy="153" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>

  <circle cx="470" cy="146" r="20" fill="url(#metal)" stroke="#050505" stroke-width="1.2"/>
  <circle cx="470" cy="146" r="17.2" fill="#121314" stroke="#817d72" stroke-width=".8"/>
  <circle cx="470" cy="146" r="14" fill="url(#jackCup)" stroke="#68645b" stroke-width=".9"/>
  <circle cx="464.5" cy="142.8" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>
  <circle cx="475.5" cy="142.8" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>
  <circle cx="470" cy="153" r="2.4" fill="#050505" stroke="#5d5a52" stroke-width=".7"/>

  <circle cx="704" cy="146" r="18" fill="url(#metal)" stroke="#050505" stroke-width="1.3"/>
  <circle cx="704" cy="146" r="12.24" fill="#090909" stroke="#c9c3b3" stroke-width="1.3"/>
  <circle cx="704" cy="146" r="6.12" fill="#1d1d1c" stroke="#050505"/>

  <circle cx="818" cy="146" r="18" fill="url(#metal)" stroke="#050505" stroke-width="1.3"/>
  <circle cx="818" cy="146" r="12.24" fill="#090909" stroke="#c9c3b3" stroke-width="1.3"/>
  <circle cx="818" cy="146" r="6.12" fill="#1d1d1c" stroke="#050505"/>
</g>
</svg>
