<svg xmlns="http://www.w3.org/2000/svg" width="260" height="620" viewBox="0 0 260 620" role="img" aria-label="LEFT LINE ARRAY">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#343638"/>
      <stop offset="0.48" stop-color="#212325"/>
      <stop offset="1" stop-color="#101113"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7e7e7e"/>
      <stop offset="0.18" stop-color="#2a2b2d"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ddd9ce"/>
      <stop offset="0.22" stop-color="#76746d"/>
      <stop offset="0.52" stop-color="#242628"/>
      <stop offset="0.83" stop-color="#090a0b"/>
      <stop offset="1" stop-color="#7b776d"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect x="5" y="6" width="250" height="608" rx="14" fill="url(#edge)" filter="url(#shadow)"/>
  <rect x="18" y="20" width="224" height="580" rx="10" fill="url(#face)" stroke="#60615b" stroke-width="1.3"/>

  <text x="130" y="52" text-anchor="middle"
    font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif"
    font-size="15" font-weight="900" fill="#ffffff" stroke="#000" stroke-width=".9" paint-order="stroke">LEFT LINE ARRAY</text>
  <text x="130" y="78" text-anchor="middle"
    font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif"
    font-size="10" font-weight="800" fill="#cfd7cd">SPEAKER INPUT PANEL</text>

  <g font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif" text-anchor="middle" font-size="14" font-weight="900">
    <text x="130" y="132" fill="#68e3ff">HIGH IN</text>
    <text x="130" y="292" fill="#91ee75">MID IN</text>
    <text x="130" y="452" fill="#f1c75b">LOW IN</text>
  </g>

  <g filter="url(#shadow)">
    <image href="data:image/svg+xml;base64," x="92.0" y="130.0" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
    <image href="data:image/svg+xml;base64," x="92.0" y="290.0" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
    <image href="data:image/svg+xml;base64," x="92.0" y="450.0" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <text x="130" y="575" text-anchor="middle"
    font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif"
    font-size="11" font-weight="800" fill="#aeb7af">LEFT PA ARRAY INPUTS</text>
</svg>