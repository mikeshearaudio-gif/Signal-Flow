<svg xmlns="http://www.w3.org/2000/svg" width="940" height="240" viewBox="0 0 940 240" role="img" aria-label="MID AMPLIFIER">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#353638"/>
      <stop offset="0.45" stop-color="#1f2022"/>
      <stop offset="1" stop-color="#101113"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7f7f7f"/>
      <stop offset="0.18" stop-color="#2a2b2d"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9d6cb"/>
      <stop offset="0.20" stop-color="#77756f"/>
      <stop offset="0.50" stop-color="#242527"/>
      <stop offset="0.82" stop-color="#0a0b0c"/>
      <stop offset="1" stop-color="#7b776d"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.65"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="6" y="8" width="928" height="224" rx="14" fill="url(#edge)" filter="url(#shadow)"/>
  <rect x="18" y="20" width="904" height="198" rx="10" fill="url(#face)" stroke="#5e605c" stroke-width="1.3"/>

  <text x="470" y="34" text-anchor="middle"
    font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif"
    font-size="14" font-weight="900" fill="#ffffff">MID AMPLIFIER</text>

  <rect x="310" y="44" width="320" height="12" rx="6" fill="#0d1012" stroke="#3a3d40"/>
  <g filter="url(#softGlow)">
    <rect x="322" y="47" width="296" height="6" rx="3" fill="#91ee75" opacity="0.95"/>
    <rect x="336" y="47" width="14" height="6" rx="3" fill="#f4f0da" opacity="0.9"/>
    <rect x="366" y="47" width="10" height="6" rx="3" fill="#f4f0da" opacity="0.75"/>
    <rect x="390" y="47" width="12" height="6" rx="3" fill="#f4f0da" opacity="0.82"/>
    <rect x="418" y="47" width="9" height="6" rx="3" fill="#f4f0da" opacity="0.68"/>
    <rect x="444" y="47" width="13" height="6" rx="3" fill="#f4f0da" opacity="0.88"/>
    <rect x="472" y="47" width="8" height="6" rx="3" fill="#f4f0da" opacity="0.64"/>
    <rect x="495" y="47" width="12" height="6" rx="3" fill="#f4f0da" opacity="0.85"/>
    <rect x="524" y="47" width="9" height="6" rx="3" fill="#f4f0da" opacity="0.73"/>
    <rect x="548" y="47" width="12" height="6" rx="3" fill="#f4f0da" opacity="0.86"/>
    <rect x="575" y="47" width="15" height="6" rx="3" fill="#f4f0da" opacity="0.92"/>
  </g>

  <g font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',Arial,sans-serif"
     font-size="11" font-weight="800" fill="#ece8db" text-anchor="middle">
    <text x="170" y="114">LEFT IN</text>
    <text x="270" y="114">RIGHT IN</text>
    <text x="670" y="114">LEFT OUT</text>
    <text x="770" y="114">RIGHT OUT</text>
  </g>

  <!-- XLR/TRS style inputs -->
  <g filter="url(#shadow)">
    <circle cx="170" cy="145" r="19" fill="url(#metal)" stroke="#050505"/>
    <circle cx="170" cy="145" r="14.8" fill="#0e1012" stroke="#7a766d"/>
    <circle cx="164" cy="141" r="2.2" fill="#202427"/>
    <circle cx="176" cy="141" r="2.2" fill="#202427"/>
    <circle cx="170" cy="151" r="2.2" fill="#202427"/>

    <circle cx="270" cy="145" r="19" fill="url(#metal)" stroke="#050505"/>
    <circle cx="270" cy="145" r="14.8" fill="#0e1012" stroke="#7a766d"/>
    <circle cx="264" cy="141" r="2.2" fill="#202427"/>
    <circle cx="276" cy="141" r="2.2" fill="#202427"/>
    <circle cx="270" cy="151" r="2.2" fill="#202427"/>
  </g>

  <!-- Speakon outputs -->
  <g filter="url(#shadow)">
    <image href="data:image/svg+xml;base64," x="637.0" y="112.0" width="66" height="66" preserveAspectRatio="xMidYMid meet"/>
    <image href="data:image/svg+xml;base64," x="737.0" y="112.0" width="66" height="66" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>