<svg xmlns="http://www.w3.org/2000/svg" width="700" height="240" viewBox="0 0 700 240" role="img" aria-label="LIV-007 system amp main inputs">
<defs>
  <linearGradient id="rackFace" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#343535"/><stop offset="0.48" stop-color="#222323"/><stop offset="1" stop-color="#111214"/></linearGradient>
  <linearGradient id="rackEdge" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#777"/><stop offset="0.18" stop-color="#272727"/><stop offset="1" stop-color="#060606"/></linearGradient>
  <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0ddd0"/><stop offset="0.22" stop-color="#71706a"/><stop offset="0.52" stop-color="#202122"/><stop offset="0.83" stop-color="#0b0c0d"/><stop offset="1" stop-color="#7e7a70"/></linearGradient>
  <linearGradient id="jackCup" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1e2021"/><stop offset="0.45" stop-color="#060708"/><stop offset="1" stop-color="#000"/></linearGradient>
  <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.65"/></filter>

  <style>
    @keyframes liv007AmpLedPulse {
      0%, 100% { opacity: .26; }
      50% { opacity: 1; }
    }
    @keyframes liv007AmpLedSweep {
      0% { transform: translateX(-110px); opacity: .12; }
      45% { opacity: .75; }
      100% { transform: translateX(110px); opacity: .12; }
    }
    .liv007-amp-led {
      animation: liv007AmpLedPulse 1.6s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .liv007-amp-led-scan {
      animation: liv007AmpLedSweep 2.1s linear infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
  </style>

</defs>

<rect x="4" y="6" width="692" height="228" rx="8" fill="url(#rackEdge)" filter="url(#shadow)"/>
<rect x="18" y="14" width="664" height="212" rx="5" fill="url(#rackFace)" stroke="#5e5e58" stroke-width="1.2"/>
<path d="M22 18H678" stroke="#7d7a70" stroke-opacity="0.5"/>
<path d="M22 222H678" stroke="#000" stroke-opacity="0.8"/>
