<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="170" height="58" viewBox="0 0 170 58" role="img" aria-label="white label tape TB">
<defs>
  <filter id="paperShadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.32"/>
  </filter>
  <filter id="paperTexture" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="11" result="noise"/>
    <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.92  0 0 0 0 0.90  0 0 0 0 0.82  0 0 0 0.10 0" result="paperNoise"/>
    <feBlend in="SourceGraphic" in2="paperNoise" mode="multiply"/>
  </filter>
  <linearGradient id="tapeFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fffef5"/>
    <stop offset="0.52" stop-color="#f5f1dc"/>
    <stop offset="1" stop-color="#e4ddc1"/>
  </linearGradient>
  <linearGradient id="liftFill" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset="1" stop-color="#d4ccb0"/>
  </linearGradient>
</defs>
<g class="sf-label-tape" data-label="TB" data-editable-text="true" transform="rotate(0 85.0 29.0)">
  <polygon points="6,4 153,3 160,8 157,44 7,46 3,39" fill="#000000" opacity="0.14" transform="translate(2 4)"/>
  <polygon points="6,4 153,3 160,8 157,44 7,46 3,39" fill="url(#tapeFill)" filter="url(#paperTexture)"/>
  <polygon points="6,4 153,3 160,8 157,44 7,46 3,39" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.5"/>
  <polygon points="6,4 153,3 160,8 157,44 7,46 3,39" fill="none" stroke="#958b70" stroke-opacity="0.22" stroke-width="1"/>
  
  <path d="M14 14 C48 11, 94 14, 132 11" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.5"/>
  <path d="M18 38 C55 42, 100 38, 145 40" fill="none" stroke="#8a8065" stroke-opacity="0.12" stroke-width="1.4"/>
  <g transform="rotate(2 85.0 29.0)">
    <text x="85.0" y="29.0" text-anchor="middle" dominant-baseline="middle"
      font-family="'Bradley Hand', 'Segoe Print', 'Marker Felt', 'Comic Sans MS', cursive" font-size="21" font-weight="700"
      letter-spacing="1.5" fill="#11110f" opacity="0.96">TB</text>
    <text x="85.8" y="29.5" text-anchor="middle" dominant-baseline="middle"
      font-family="'Bradley Hand', 'Segoe Print', 'Marker Felt', 'Comic Sans MS', cursive" font-size="21" font-weight="700"
      letter-spacing="1.5" fill="#000000" opacity="0.11">TB</text>
  </g>
</g>
</svg>
