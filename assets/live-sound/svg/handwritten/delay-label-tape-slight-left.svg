<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="305" height="92" viewBox="0 0 305 92" role="img" aria-label="white label tape Delay">
<defs>
  <filter id="paperShadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.32"/>
  </filter>
  <filter id="paperTexture" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="11" result="noise"/>
    <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.92  0 0 0 0 0.90  0 0 0 0 0.82  0 0 0 0.10 0" result="paperNoise"/>
    <feBlend in="SourceGraphic" in2="paperNoise" mode="multiply"/>
  </filter>
  <linearGradient id="tapeFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fffef5"/>
    <stop offset="0.52" stop-color="#f5f1dc"/>
    <stop offset="1" stop-color="#e4ddc1"/>
  </linearGradient>
  <linearGradient id="liftFill" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff"/>
    <stop offset="1" stop-color="#d4ccb0"/>
  </linearGradient>
</defs>
<g class="sf-label-tape" data-label="Delay" data-editable-text="true" transform="rotate(-2 152.5 46.0)">
  <polygon points="10,7 282,4 295,13 289,78 9,80 4,66" fill="#000000" opacity="0.14" transform="translate(2 4)"/>
  <polygon points="10,7 282,4 295,13 289,78 9,80 4,66" fill="url(#tapeFill)" filter="url(#paperTexture)"/>
  <polygon points="10,7 282,4 295,13 289,78 9,80 4,66" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="1.5"/>
  <polygon points="10,7 282,4 295,13 289,78 9,80 4,66" fill="none" stroke="#958b70" stroke-opacity="0.22" stroke-width="1"/>
  
  <path d="M18 17 C64 12, 110 18, 160 12" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
  <path d="M20 56 C75 62, 134 56, 196 61" fill="none" stroke="#8a8065" stroke-opacity="0.12" stroke-width="2"/>
  <g transform="rotate(-1 152.5 46.0)">
    <text x="152.5" y="46.0" text-anchor="middle" dominant-baseline="middle"
      font-family="'Bradley Hand', 'Segoe Print', 'Marker Felt', 'Comic Sans MS', cursive" font-size="34" font-weight="650"
      letter-spacing="0.5" fill="#11110f" opacity="0.96">Delay</text>
    <text x="153.3" y="46.5" text-anchor="middle" dominant-baseline="middle"
      font-family="'Bradley Hand', 'Segoe Print', 'Marker Felt', 'Comic Sans MS', cursive" font-size="34" font-weight="650"
      letter-spacing="0.5" fill="#000000" opacity="0.11">Delay</text>
  </g>
</g>
</svg>
