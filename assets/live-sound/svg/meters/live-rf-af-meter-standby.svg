ass="sf-meter-bar sf-meter-off" x="116.0" y="72" width="4.0" height="7" fill="#1d211a" rx="1"/><circle class="sf-led sf-led-standby" cx="178" cy="38" r="4" fill="#b7ef55" opacity="0.36" /><text x="191" y="42" class="tiny">SIGNAL</text><circle class="sf-led sf-led-standby" cx="178" cy="65" r="4" fill="#ef4a43" opacity="0.36" /><text x="191" y="69" class="tiny">LIMIT</text><rect x="170" y="90" width="86" height="20" rx="10" fill="#202422" stroke="#555"/><text x="213" y="104" class="tiny" text-anchor="middle">STANDBY</text>
