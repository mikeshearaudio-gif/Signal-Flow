  <script>
  (function(){
    const GAME = 'Signal_Flow_v1_41_16_IR_NORMAL_LEVEL_FLOW_FIX.html';

    const LEVELS = {
      REC:[

        'REC-036','REC-037','REC-038','REC-039','REC-040',
        'REC-041','REC-042','REC-043','REC-044','REC-045',

      ],

      LIV:[
        'LIV-001','LIV-002','LIV-003','LIV-004','LIV-IR-01',
        'LIV-006','LIV-007','LIV-008','LIV-009','LIV-010',
        'LIV-011','LIV-012','LIV-013','LIV-IR-02','LIV-015',
        'LIV-016','LIV-017','LIV-018','LIV-019','LIV-020',
        'LIV-021','LIV-022','LIV-023','LIV-IR-03','LIV-025',
        'LIV-026','LIV-027','LIV-028','LIV-029','LIV-030',
        'LIV-031','LIV-032','LIV-033','LIV-034','LIV-IR-04',
        'LIV-036','LIV-037','LIV-038','LIV-039','LIV-040',
        'LIV-041','LIV-042','LIV-043','LIV-044','LIV-045',
        'LIV-IR-05','LIV-047','LIV-048','LIV-049','LIV-050'
      ],

      BRD:[
        'BRD-001','BRD-002','BRD-003','BRD-004','BRD-IR-01',
        'BRD-006','BRD-007','BRD-008','BRD-009','BRD-010',
        'BRD-011','BRD-IR-02','BRD-013','BRD-014','BRD-015',
        'BRD-016','BRD-017','BRD-018','BRD-019','BRD-020',
        'BRD-021','BRD-022','BRD-023','BRD-IR-03','BRD-025',
        'BRD-026','BRD-027','BRD-028','BRD-029','BRD-030',
        'BRD-031','BRD-032','BRD-033','BRD-034','BRD-035',
        'BRD-036','BRD-IR-04','BRD-038','BRD-039','BRD-040',
        'BRD-041','BRD-042','BRD-043','BRD-044','BRD-045',
        'BRD-046','BRD-047','BRD-048','BRD-049','BRD-050'
      ],

      PST:[
        'PST-001','PST-002','PST-003','PST-004','PST-IR-01',
        'PST-006','PST-007','PST-008','PST-009','PST-010',
        'PST-011','PST-012','PST-013','PST-IR-02','PST-015',
        'PST-016','PST-017','PST-018','PST-019','PST-020',

        'PST-036','PST-037','PST-038','PST-039','PST-040',
        'PST-041','PST-042','PST-043','PST-044','PST-045',
        'PST-IR-05','PST-047','PST-048','PST-049','PST-050'
      ],

      GAM:[
        'GAM-001','GAM-002','GAM-003','GAM-004','GAM-IR-01',
        'GAM-006','GAM-007','GAM-008','GAM-009','GAM-010',
        'GAM-011','GAM-012','GAM-013','GAM-IR-02','GAM-015',
        'GAM-016','GAM-017','GAM-018','GAM-019','GAM-020',
        'GAM-021','GAM-022','GAM-023','GAM-024','GAM-IR-03',
        'GAM-026','GAM-027','GAM-028','GAM-029','GAM-030',
        'GAM-031','GAM-032','GAM-033','GAM-034','GAM-035',
        'GAM-036','GAM-IR-04','GAM-038','GAM-039','GAM-040',
        'GAM-041','GAM-042','GAM-043','GAM-044','GAM-045',
        'GAM-046','GAM-047','GAM-IR-05','GAM-049','GAM-050'
      ]
    };
    const IR_IDS = new Set(Object.values(LEVELS).flat().filter(id => id.includes('-IR-')));

    const PUBLIC_LABELS = {};
    const INTERNAL_BY_PUBLIC = {};

    Object.keys(LEVELS).forEach(env => {
      LEVELS[env].forEach((id, index) => {
        const publicId = env + '-' + String(index + 1).padStart(3, '0');
        PUBLIC_LABELS[id] = id.includes('-IR-') ? publicId : id;
        INTERNAL_BY_PUBLIC[publicId] = id;
        INTERNAL_BY_PUBLIC[id] = id;
      });
    });

    function displayLabel(id){
      return PUBLIC_LABELS[id] || id;
    }

    function internalId(input){
      const clean = String(input || '').trim().toUpperCase();
      return INTERNAL_BY_PUBLIC[clean] || clean;
    }
    const PROGRESS_KEY = 'signal_flow_progress_v36';
    const frame = document.getElementById('gameFrame'); const envSelect = document.getElementById('envSelect'); const levelSelect = document.getElementById('levelSelect'); const manualLevel = document.getElementById('manualLevel'); const scoreReadout = document.getElementById('scoreReadout');
    let currentScore = 0;
    function updateScore(points){
      currentScore = Number(points || 0);
      scoreReadout.textContent = 'Score: ' + currentScore;
    }
    function defaultProgress(){ return { completedLevels: [], unlockedRewards: [], unlockedMics: [] }; }
    function loadProgress(){
      try{
        const raw = localStorage.getItem(PROGRESS_KEY);
        const parsed = raw ? JSON.parse(raw) : defaultProgress();
        return {
          completedLevels: Array.isArray(parsed.completedLevels) ? parsed.completedLevels : [],
          unlockedRewards: Array.isArray(parsed.unlockedRewards) ? parsed.unlockedRewards : [],
          unlockedMics: Array.isArray(parsed.unlockedMics) ? parsed.unlockedMics : []
        };
      }catch{ return defaultProgress(); }
    }
    function saveProgress(progress){
      try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress || defaultProgress())); }catch{}
    }
    function recordCompletion(id){
      const progress = loadProgress();
      if(id && !progress.completedLevels.includes(id)){
        progress.completedLevels.push(id);
        saveProgress(progress);
      }
    }
    updateScore(0);
    function populate(env){
      const ids = LEVELS[env] || LEVELS.PST;
      levelSelect.innerHTML = '';
      ids.forEach(id => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = displayLabel(id);
        levelSelect.appendChild(opt);
      });
      if(!ids.includes(levelSelect.value)) levelSelect.value = ids[0];
    }

    function routeFor(id){
      return IR_IDS.has(id)
        ? IR_RUNNER + '?level=' + encodeURIComponent(id) + '&display=' + encodeURIComponent(displayLabel(id))
        : GAME + '#/level/' + encodeURIComponent(id);
    }
    function delegateToGameFrame(id){
      if(IR_IDS.has(id)) return false;
      try{
        const win = frame.contentWindow;
        if(win && typeof win.sfNativeGameShellLoadLevel === 'function'){
          return win.sfNativeGameShellLoadLevel(id) !== false;
        }
      }catch{}
      return false;
    }

    function loadLevel(id){
      const clean = internalId(id);
      if(!clean) return;
      manualLevel.value = displayLabel(clean);
      const prefix = clean.split('-')[0];
      if(LEVELS[prefix]){
        envSelect.value = prefix;
        populate(prefix);
        if(Array.from(levelSelect.options).some(o => o.value === clean)) levelSelect.value = clean;
      }
      updateScore(0);
      if(!delegateToGameFrame(clean)) frame.src = routeFor(clean);
    }
    function nextLevel(){ const ids=LEVELS[envSelect.value]||LEVELS.PST; const cur=internalId(manualLevel.value); const idx=ids.indexOf(cur); loadLevel(ids[(idx+1+ids.length)%ids.length]); }
    envSelect.addEventListener('change',()=>{ populate(envSelect.value); manualLevel.value=levelSelect.value; loadLevel(levelSelect.value); });
    levelSelect.addEventListener('change',()=>{ manualLevel.value=levelSelect.value; loadLevel(levelSelect.value); });
    document.getElementById('loadBtn').addEventListener('click',()=>loadLevel(manualLevel.value));
    manualLevel.addEventListener('keydown',ev=>{ if(ev.key==='Enter') loadLevel(manualLevel.value); });
    document.getElementById('homeBtn').addEventListener('click',()=>{ frame.src=GAME; });
    window.addEventListener('message',ev=>{ const msg=ev.data||{}; if(msg.type==='sf-ir-complete'){ updateScore(msg.points); recordCompletion(msg.levelId); } if(msg.type==='sf-ir-next') nextLevel(); if(msg.type==='sf-ir-choose'){ envSelect.focus(); } });
    populate('PST'); loadLevel('PST-IR-01');
  })();
  </script>



<script id="sf-brief-todo-attention-runtime-script-v4">

  const HEADING_RE = /^(level brief|brief|objective|objectives|to[-\s]?do|tasks?|checklist)\b/i;
  const TEXT_RE = /\b(level brief|brief|objective|objectives|to[-\s]?do|tasks?|checklist|patch this|route|connect|signal path)\b/i;
  const WRAPPER_RE = /sidebar|column|left-col|leftcol|layout|wrapper|container|nav|shell|app|main/i;
  const CARD_RE = /brief|todo|to-do|task|checklist|objective|mission|panel|card/i;

    const style = doc.createElement("style");

    style.textContent = document.getElementById("sf-brief-todo-attention-runtime-v4") ? document.getElementById("sf-brief-todo-attention-runtime-v4").textContent : "";

  }

  function visible(el) {
    const r = rectOf(el);
    return r.width > 80 && r.height > 28;
  }

  function leftSide(el, win) {
    const r = rectOf(el);
    return r.left < Math.max(430, win.innerWidth * 0.48);
  }

  function classId(el) {
    return String(el.className || "") + " " + String(el.id || "");
  }

  function textOf(el) {
    return (el.innerText || el.textContent || "").trim();
  }

  function tooBroad(el, win) {
    const r = rectOf(el);
    const ci = classId(el);
    const text = textOf(el);
    if (WRAPPER_RE.test(ci) && !CARD_RE.test(ci)) return true;
    if (r.width > Math.min(620, win.innerWidth * 0.54)) return true;
    if (r.height > Math.min(430, win.innerHeight * 0.62)) return true;
    if ((text.match(/\b(brief|objective|to[-\s]?do|task|checklist)\b/gi) || []).length > 4) return true;
    return false;
  }

  function cardFor(el, win) {
    let best = el;

    for (let node = el; node && node !== node.ownerDocument.body; node = node.parentElement) {
      const r = rectOf(node);
      const ci = classId(node);

      if (!visible(node) || !leftSide(node, win)) continue;
      if (tooBroad(node, win)) break;

      if (
        CARD_RE.test(ci) ||
        (r.width >= 150 && r.width <= 560 && r.height >= 42 && r.height <= 360)
      ) {
        best = node;
      }
    }

    return best;
  }

  function score(el, win) {
    const text = textOf(el);
    if (!text || !TEXT_RE.test(text)) return 0;
    if (!visible(el) || !leftSide(el, win)) return 0;
    if (tooBroad(el, win)) return 0;

    const r = rectOf(el);
    const ci = classId(el);
    let s = 1;

    if (HEADING_RE.test(text)) s += 8;
    if (CARD_RE.test(ci)) s += 6;
    if (text.length >= 8 && text.length <= 900) s += 2;
    if (r.width >= 160 && r.width <= 520) s += 2;
    if (r.height >= 42 && r.height <= 320) s += 2;

    return s;
  }

  function applyInDocument(doc, win) {
    if (!doc || !win || !doc.body) return 0;
    ensureStyle(doc);

    doc.querySelectorAll(".sf-brief-todo-attention").forEach(el => {
      el.classList.remove("sf-brief-todo-attention");
    });

    const all = Array.from(doc.querySelectorAll("h1,h2,h3,h4,h5,p,li,div,section,article,ul,ol"));

    const candidates = all
      .map(el => [score(el, win), el])
      .filter(pair => pair[0] > 0)
      .sort((a, b) => b[0] - a[0])
      .map(pair => cardFor(pair[1], win))
      .filter(el => !tooBroad(el, win));

    const unique = [];
    for (const el of candidates) {
      if (!unique.includes(el) && !unique.some(existing => existing.contains(el) || el.contains(existing))) {
        unique.push(el);
      }
      if (unique.length >= 3) break;
    }

    unique.forEach(el => el.classList.add("sf-brief-todo-attention"));
    return unique.length;
  }

  function frames() {
    const out = [];
    document.querySelectorAll("iframe").forEach(frame => {
      try {
        if (frame.contentDocument && frame.contentWindow) out.push([frame.contentDocument, frame.contentWindow]);
      } catch (err) {}
    });
    return out;
  }

  function applyBriefTodoAttention() {
    let count = applyInDocument(document, window);
    frames().forEach(pair => {
      count += applyInDocument(pair[0], pair[1]);
    });
    return count;
  }

  window.sfApplyBriefTodoAttention = applyBriefTodoAttention;

  function schedule(delay) {
    setTimeout(applyBriefTodoAttention, delay);
  }

  document.addEventListener("DOMContentLoaded", () => schedule(80));
  window.addEventListener("load", () => {
    schedule(80);
    schedule(450);
    schedule(1200);
  });
  window.addEventListener("hashchange", () => schedule(180));
  window.addEventListener("popstate", () => schedule(180));

  const observer = new MutationObserver(() => {
    clearTimeout(window.sfBriefTodoAttentionTimer);
    window.sfBriefTodoAttentionTimer = setTimeout(applyBriefTodoAttention, 180);
  });

  observer.observe(document.documentElement, {
    childList: true,
    subtree: true,
    characterData: true
  });

  schedule(180);
  schedule(900);
})();

<script id="sf-universal-scroll-cues-script-v1">
(function () {
  if (window.sfUniversalScrollCuesV1Installed) return;
  window.sfUniversalScrollCuesV1Installed = true;

  function ensureStyle(doc) {
    if (!doc || doc.getElementById("sf-universal-scroll-cues-v1")) return;
    var src = document.getElementById("sf-universal-scroll-cues-v1");
    var style = doc.createElement("style");
    style.id = "sf-universal-scroll-cues-v1";
    style.textContent = src ? src.textContent : "";
    doc.head.appendChild(style);
  }

  function rectFor(el, doc, win) {
    if (el === doc.scrollingElement || el === doc.documentElement || el === doc.body) {
      return {
        left: 0,
        top: 0,
        right: win.innerWidth,
        bottom: win.innerHeight,
        width: win.innerWidth,
        height: win.innerHeight
      };
    }
    return el.getBoundingClientRect();
  }

  function maxScrollY(el, doc, win) {
    if (el === doc.scrollingElement || el === doc.documentElement || el === doc.body) {
      return Math.max(0, doc.scrollingElement.scrollHeight - win.innerHeight);
    }
    return Math.max(0, el.scrollHeight - el.clientHeight);
  }

  function maxScrollX(el, doc, win) {
    if (el === doc.scrollingElement || el === doc.documentElement || el === doc.body) {
      return Math.max(0, doc.scrollingElement.scrollWidth - win.innerWidth);
    }
    return Math.max(0, el.scrollWidth - el.clientWidth);
  }

  function scrollTopOf(el, doc) {
    if (el === doc.scrollingElement || el === doc.documentElement || el === doc.body) {
      return doc.scrollingElement.scrollTop;
    }
    return el.scrollTop;
  }

  function scrollLeftOf(el, doc) {
    if (el === doc.scrollingElement || el === doc.documentElement || el === doc.body) {
      return doc.scrollingElement.scrollLeft;
    }
    return el.scrollLeft;
  }

  function visibleRect(r) {
    return r.width > 160 && r.height > 120 && r.bottom > 0 && r.right > 0;
  }

  function makeCue(doc, dir, x, y) {
    var cue = doc.createElement("div");
    cue.className = "sf-scroll-cue sf-scroll-cue-" + dir;
    cue.style.left = Math.round(x - 21) + "px";
    cue.style.top = Math.round(y - 21) + "px";
    cue.setAttribute("aria-hidden", "true");
    doc.body.appendChild(cue);
  }

  function makeNativeSurfacesScrollable(doc) {
    doc.querySelectorAll(".patchbay-wrap.front-panel-view, .sf-live-native-layer:not(.sf-live-native-level-liv-010)").forEach(function(el) {
      var r = el.getBoundingClientRect();
      if (r.width < 200 || r.height < 160) return;

      var needsY = el.scrollHeight > el.clientHeight + 8;
      var needsX = el.scrollWidth > el.clientWidth + 8;

      if (needsY || needsX) {
        el.classList.add("sf-scroll-managed");
      } else {
        el.classList.remove("sf-scroll-managed");
      }
    });
  }

  function findScrollableCandidates(doc) {
    var set = new Set();

    if (doc.scrollingElement) set.add(doc.scrollingElement);

    doc.querySelectorAll([
      ".sf-live-native-layer",
      ".patchbay-wrap.front-panel-view",
      ".lesson-panel",
      ".level-panel",
      ".sidebar",
      "aside",
      "main",
      "section",
      "article",
      "div",
      "ol",
      "ul"
    ].join(",")).forEach(function(el) {
      set.add(el);
    });

    return Array.from(set);
  }

  function applyIn(doc, win) {
    if (!doc || !win || !doc.body) return 0;
    ensureStyle(doc);
    makeNativeSurfacesScrollable(doc);

    doc.querySelectorAll(".sf-scroll-cue").forEach(function(el) {
      el.remove();
    });

    var count = 0;
    var candidates = findScrollableCandidates(doc);

    candidates.forEach(function(el) {
      if (count > 16) return;

      var r = rectFor(el, doc, win);
      if (!visibleRect(r)) return;

      var maxY = maxScrollY(el, doc, win);
      var maxX = maxScrollX(el, doc, win);

      // Do not show cues unless this exact element has a real hidden scroll range.
      if (maxY < 32 && maxX < 32) return;

      // Native board layers are often large absolute-position canvases. Only the
      // actual scroll host should get arrows.
      if (
        el.classList &&
        el.classList.contains("sf-live-native-layer") &&
        !el.classList.contains("sf-live-native-scroll-host-liv010")
      ) {
        return;
      }

      var top = scrollTopOf(el, doc);
      var left = scrollLeftOf(el, doc);

      var centerX = Math.max(30, Math.min(win.innerWidth - 30, r.left + r.width / 2));
      var centerY = Math.max(30, Math.min(win.innerHeight - 30, r.top + r.height / 2));

      if (maxY >= 12 && top > 8) {
        makeCue(doc, "up", centerX, Math.max(28, r.top + 28));
        count += 1;
      }

      if (maxY >= 12 && top < maxY - 8) {
        makeCue(doc, "down", centerX, Math.min(win.innerHeight - 28, r.bottom - 28));
        count += 1;
      }

      if (maxX >= 12 && left > 8) {
        makeCue(doc, "left", Math.max(28, r.left + 28), centerY);
        count += 1;
      }

      if (maxX >= 12 && left < maxX - 8) {
        makeCue(doc, "right", Math.min(win.innerWidth - 28, r.right - 28), centerY);
        count += 1;
      }
    });

    return count;
  }

  function frames() {
    var out = [];
    document.querySelectorAll("iframe").forEach(function(frame) {
      try {
        if (frame.contentDocument && frame.contentWindow) {
          out.push([frame.contentDocument, frame.contentWindow]);
        }
      } catch (err) {}
    });
    return out;
  }

  function updateScrollCues() {
    var count = applyIn(document, window);
    frames().forEach(function(pair) {
      count += applyIn(pair[0], pair[1]);
    });
    return count;
  }

  window.sfUpdateScrollCues = updateScrollCues;

  function schedule(delay) {
    setTimeout(updateScrollCues, delay);
  }

  document.addEventListener("DOMContentLoaded", function () { schedule(120); });
  window.addEventListener("load", function () {
    schedule(120);
    schedule(650);
    schedule(1500);
  });
  window.addEventListener("resize", function () { schedule(100); });
  window.addEventListener("hashchange", function () { schedule(200); });
  window.addEventListener("popstate", function () { schedule(200); });
  window.addEventListener("scroll", function () { schedule(20); }, true);

  const observer = new MutationObserver(function () {
    clearTimeout(window.sfUniversalScrollCueTimer);
    window.sfUniversalScrollCueTimer = setTimeout(updateScrollCues, 160);
  });

  observer.observe(document.documentElement, {
    childList: true,
    subtree: true,
    attributes: true,
    characterData: true
  });

  schedule(250);
  schedule(1000);
})();
</script>

<script id="sf-native-game-shell-state-v1">
(function () {
  if (window.sfNativeGameShellStateInstalled) return;
  window.sfNativeGameShellStateInstalled = true;
  window.sfNativeGameShellOwnsNavigation = true;
  window.sfCentralCompletionNextInstalled = true;

  function normalizeLevelId(value) {
    var match = String(value || "").toUpperCase().match(/\b([A-Z]{3})[-_ ]?(\d{1,3})\b/);
    if (!match) return "";
    return match[1] + "-" + String(Number(match[2])).padStart(3, "0");
  }

  function visible(el) {
    if (!el || !el.getBoundingClientRect) return false;
    var r = el.getBoundingClientRect();
    return r.width > 8 && r.height > 8 && r.bottom > 0 && r.right > 0;
  }

  function selectedLevelFromSelect(select) {
    if (!select) return "";
    var option = select.options && select.options[select.selectedIndex];

    return normalizeLevelId(
      (option && (option.textContent || option.value)) ||
      select.value ||
      ""
    );
  }

  function currentGameLevelId() {
    var candidates = [];

    document.querySelectorAll("select").forEach(function(select) {
      if (!visible(select)) return;

      var id = selectedLevelFromSelect(select);
      if (!id) return;

      var r = select.getBoundingClientRect();
      var option = select.options && select.options[select.selectedIndex];
      var selectedText = option ? option.textContent || "" : "";

      var context = [
        select.id,
        select.name,
        select.getAttribute("aria-label"),
        selectedText,
        select.parentElement && select.parentElement.textContent
      ].join(" ");

      var score = 0;

      // Prefer the in-game selector, not the exterior wrapper.
      if (r.top > 185) score += 100;
      if (r.top <= 185) score -= 100;

      if (/\[BUILD\]|\[QUIZ\]|\[PATCH\]/i.test(selectedText)) score += 30;
      if (/board|level|LIV/i.test(context)) score += 15;
      if (/environment|sound reinforcement|recording studio|post production/i.test(context)) score -= 20;

      candidates.push({
        id: id,
        score: score,
        top: r.top,
        selectedText: selectedText
      });
    });

    candidates.sort(function(a, b) {
      return b.score - a.score;
    });

    if (candidates[0]) {
      return candidates[0].id;
    }

    // Fallback: visible in-game title/brief, never the exterior top wrapper.
    var titleCandidates = [];

    document.querySelectorAll("h1, h2, h3, .level-title, .current-level, aside, main, section").forEach(function(el) {
      if (!visible(el)) return;

      var r = el.getBoundingClientRect();
      if (r.top < 185) return;

      var id = normalizeLevelId(el.textContent || "");
      if (id) {
        titleCandidates.push({ id: id, top: r.top });
      }
    });

    titleCandidates.sort(function(a, b) {
      return a.top - b.top;
    });

    return titleCandidates[0] ? titleCandidates[0].id : "";
  }

  function nextSequentialLevelId(levelId) {
    var match = String(levelId || "").toUpperCase().match(/^([A-Z]{3})-(\d{3})$/);
    if (!match) return "";
    return match[1] + "-" + String(Number(match[2]) + 1).padStart(3, "0");
  }

  function findInGameLevelOption(targetId) {
    var candidates = [];

    document.querySelectorAll("select").forEach(function(select) {
      if (!visible(select)) return;

      var option = Array.from(select.options || []).find(function(opt) {
        return normalizeLevelId(opt.value) === targetId ||
               normalizeLevelId(opt.textContent) === targetId;
      });

      if (!option) return;

      var r = select.getBoundingClientRect();
      var score = 0;

      // Prefer the in-game selector below the wrapper.
      if (r.top > 185) score += 100;
      if (r.top <= 185) score -= 100;

      if (/\[BUILD\]|\[QUIZ\]|\[PATCH\]/i.test(option.textContent || "")) score += 30;

      candidates.push({
        select: select,
        option: option,
        score: score,
        top: r.top
      });
    });

    candidates.sort(function(a, b) {
      return b.score - a.score;
    });

    return candidates[0] || null;
  }

  function removeCompletionModal(button) {
    var modal = button && button.closest && button.closest(
      ".sf-native-completion, .sf-native-completion-popup, .native-completion, .completion-popup, .level-complete, .modal, .popup, [class*='completion'], [class*='complete']"
    );

    if (modal && /LEVEL COMPLETE/i.test(modal.textContent || "")) {
      modal.remove();
    }
  }

  function findInGameLoadButton() {
    var buttons = Array.from(document.querySelectorAll("button, [role='button'], input[type='button'], input[type='submit']"));

    return buttons.find(function(btn) {
      if (!visible(btn)) return false;

      var r = btn.getBoundingClientRect();
      if (r.top <= 185) return false;

      var text = (btn.textContent || btn.value || btn.getAttribute("aria-label") || "").trim();
      return /^load board$/i.test(text) || /^load$/i.test(text);
    }) || null;
  }

  function loadGameLevel(targetId) {
    var target = normalizeLevelId(targetId);
    if (!target) return false;

    var found = findInGameLevelOption(target);

    if (found && found.select && found.option) {
      found.select.value = found.option.value;
      found.option.selected = true;

      // The in-game selector owns game state. Trigger its normal load behavior.
      found.select.dispatchEvent(new Event("input", { bubbles: true }));
      found.select.dispatchEvent(new Event("change", { bubbles: true }));

      console.log("[Signal Flow] Native game shell changed in-game selector:", target);
      var selectedLoadButton = findInGameLoadButton();
      if (selectedLoadButton) {
        selectedLoadButton.click();
        console.log("[Signal Flow] Native game shell clicked in-game Load Board:", target);
      }
      return true;
    }

    try {
      if (typeof window.loadLevel === "function") {
        window.loadLevel(target);
        console.log("[Signal Flow] Native game shell loaded level:", target);
        return true;
      }
    } catch (err) {
      console.warn("[Signal Flow] Native game shell loadLevel failed:", err);
    }

    try {
      var loadButton = findInGameLoadButton();

      if (loadButton) {
        loadButton.click();
        console.log("[Signal Flow] Native game shell clicked in-game Load Board:", target);
        return true;
      }
    } catch (err) {
      console.warn("[Signal Flow] Native game shell Load Board click failed:", err);
    }

    console.warn("[Signal Flow] Native game shell could not load:", target);
    return false;
  }

  function isCompletionNextButton(button) {
    if (!button) return false;

    var text = (button.textContent || button.value || button.getAttribute("aria-label") || "").trim();
    if (!/\b(next|next level|continue|continue to next)\b/i.test(text)) return false;

    var container = button.closest && button.closest(
      ".sf-native-completion, .sf-native-completion-popup, .native-completion, .completion-popup, .level-complete, .modal, .popup, [class*='completion'], [class*='complete']"
    );

    if (!container) return false;

    return /LEVEL COMPLETE|complete|completed/i.test(container.textContent || "");
  }

  document.addEventListener("click", function(event) {
    var button = event.target && event.target.closest
      ? event.target.closest("button, [role='button'], input[type='button'], input[type='submit'], a")
      : null;

    if (!isCompletionNextButton(button)) return;

    var currentId = currentGameLevelId();
    var nextId = nextSequentialLevelId(currentId);

    if (!currentId || !nextId) {
      console.warn("[Signal Flow] Native game shell could not determine current/next:", currentId, nextId);
      return;
    }

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    console.log("[Signal Flow] Native game shell completion Next:", currentId, "->", nextId);

    removeCompletionModal(button);
    loadGameLevel(nextId);
  }, true);

  function devShellEnabled() {
    return (
      /[?&#]devShell=1\b/i.test(location.href) ||
      /[?&#]dev=1\b/i.test(location.href) ||
      localStorage.getItem("sfDevShell") === "1"
    );
  }

  function markDevShell() {
    if (devShellEnabled()) {
      document.documentElement.classList.remove("sf-hide-exterior-dev-shell");
      return;
    }

    document.documentElement.classList.add("sf-hide-exterior-dev-shell");

    document.querySelectorAll("header, nav, .topbar, .toolbar, .nav, .navbar, .wrapper-controls, .environment-controls, .board-controls, .level-controls, div").forEach(function(el) {
      if (!visible(el)) return;

      var r = el.getBoundingClientRect();
      if (r.top > 185) return;

      var text = (el.textContent || "").replace(/\s+/g, " ").trim();

      var looksLikeExteriorWrapper =
        /SIGNAL FLOW/i.test(text) &&
        /ENVIRONMENT/i.test(text) &&
        /BOARD/i.test(text) &&
        /GO TO BOARD/i.test(text);

      if (!looksLikeExteriorWrapper) return;

      el.dataset.sfExteriorDevShell = "1";
    });
  }

  function installDevShellStyle() {
    if (document.getElementById("sf-native-game-shell-dev-style-v1")) return;

    var style = document.createElement("style");
    style.id = "sf-native-game-shell-dev-style-v1";
    style.textContent = [
      "html.sf-hide-exterior-dev-shell [data-sf-exterior-dev-shell='1'] {",
      "  display: none !important;",
      "}",
      "html.sf-hide-exterior-dev-shell body {",
      "  padding-top: 0 !important;",
      "}",
      "html.sf-hide-exterior-dev-shell .sf-dev-only {",
      "  display: none !important;",
      "}"
    ].join("\\n");

    document.head.appendChild(style);
  }

  function realNativeScrollExists() {
    var hosts = Array.from(document.querySelectorAll(
      ".sf-live-native-scroll-host-liv010, .sf-live-native-scroll-host, .sf-live-native-viewport"
    ));

    return hosts.some(function(el) {
      if (!el) return false;

      var y = (el.scrollHeight || 0) - (el.clientHeight || 0);
      var x = (el.scrollWidth || 0) - (el.clientWidth || 0);
      var cs = getComputedStyle(el);

      return (
        (/auto|scroll/i.test(cs.overflowY) && y > 40) ||
        (/auto|scroll/i.test(cs.overflowX) && x > 40)
      );
    });
  }

  function applyScrollCueFilter() {
    var ok = realNativeScrollExists();

    document.querySelectorAll([
      ".sf-scroll-cue",
      ".sf-scroll-arrow",
      ".sf-scroll-affordance",
      ".scroll-cue",
      ".scroll-arrow",
      "[class*='scroll-cue']",
      "[class*='scroll-arrow']",
      "[class*='ScrollCue']",
      "[class*='ScrollArrow']"
    ].join(",")).forEach(function(el) {
      if (!ok) {
        el.style.setProperty("display", "none", "important");
        el.style.setProperty("visibility", "hidden", "important");
        el.style.setProperty("opacity", "0", "important");
        el.style.setProperty("pointer-events", "none", "important");
      } else {
        el.style.removeProperty("display");
        el.style.removeProperty("visibility");
        el.style.removeProperty("opacity");
        el.style.removeProperty("pointer-events");
      }
    });
  }

  window.sfShowDevShell = function () {
    localStorage.setItem("sfDevShell", "1");
    location.reload();
  };

  window.sfHideDevShell = function () {
    localStorage.removeItem("sfDevShell");
    location.reload();
  };

  window.sfNativeGameShellCurrentLevel = currentGameLevelId;
  window.sfNativeGameShellLoadLevel = loadGameLevel;
  window.sfApplyScrollCueFilter = applyScrollCueFilter;

  installDevShellStyle();
  markDevShell();
  applyScrollCueFilter();

  window.addEventListener("load", function() {
    markDevShell();
    applyScrollCueFilter();
  });

  window.addEventListener("resize", function() {
    markDevShell();
    applyScrollCueFilter();
  });

  setInterval(function() {
    markDevShell();
    applyScrollCueFilter();
  }, 900);

  new MutationObserver(function () {
    clearTimeout(window.sfNativeGameShellTimer);
    window.sfNativeGameShellTimer = setTimeout(function() {
      markDevShell();
      applyScrollCueFilter();
    }, 80);
  }).observe(document.documentElement, {
    childList: true,
    subtree: true,
    attributes: true,
    attributeFilter: ["class", "style"]
  });
})();
</script>

</body>
</html>
