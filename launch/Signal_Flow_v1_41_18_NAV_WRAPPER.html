  <style>
    :root{--sf-bg:#07101f;--sf-panel:#0f1d34;--sf-ink:#f8fbff;--sf-muted:#9fb4d8;--sf-cyan:#00f5ff;--sf-yellow:#ffd76a;--sf-line:rgba(255,255,255,.16)}

<style id="sf-brief-todo-attention-runtime-v4">
@keyframes sfBriefTodoPulseV4 {
  0%, 100% {
    box-shadow:
      -6px 0 0 rgba(255, 215, 106, .70),
      0 0 18px rgba(255, 215, 106, .18),
      0 8px 18px rgba(0, 0, 0, .24);
    outline: 1px solid rgba(255, 215, 106, .20);
  }
  50% {
    box-shadow:
      -13px 0 0 rgba(255, 215, 106, 1),
      0 0 42px rgba(255, 215, 106, .72),
      0 0 14px rgba(255, 236, 162, .38) inset,
      0 14px 34px rgba(0, 0, 0, .42);
    outline: 1px solid rgba(255, 236, 162, .58);
  }
}

@keyframes sfBriefTodoRailPulseV4 {
  0%, 100% {
    opacity: .68;
    filter: drop-shadow(0 0 7px rgba(255, 215, 106, .32));
  }
  50% {
    opacity: 1;
    filter:
      drop-shadow(0 0 18px rgba(255, 215, 106, .95))
      drop-shadow(0 0 28px rgba(255, 236, 162, .55));
  }
}

.sf-brief-todo-attention {
  position: relative !important;
  border-left: 4px solid rgba(255, 215, 106, .92) !important;
  animation: sfBriefTodoPulseV4 1.65s ease-in-out infinite !important;
  overflow: visible !important;
  background-image:
    linear-gradient(90deg, rgba(255, 215, 106, .12), rgba(255, 215, 106, 0) 38%) !important;
}

.sf-brief-todo-attention::before {
  content: "";
  position: absolute;
  left: -11px;
  top: 6px;
  bottom: 6px;
  width: 6px;
  border-radius: 999px;
  background: linear-gradient(
    180deg,
    rgba(255, 236, 162, .18),
    rgba(255, 215, 106, 1),
    rgba(255, 236, 162, .18)
  );
  pointer-events: none;
  animation: sfBriefTodoRailPulseV4 1.65s ease-in-out infinite;
  z-index: 20;
}

<body>
  <div class="sf-shell">
    <nav class="sf-topnav" aria-label="Signal Flow navigation">
      <div class="sf-brand">SIGNAL FLOW</div>
      <label>Environment
        <select id="envSelect">
          <option value="REC">Recording</option><option value="LIV">Live Sound</option><option value="BRD">Broadcast</option><option value="PST" selected>Post</option><option value="GAM">Game Audio</option>
        </select>
      </label>
      <label>Board <select id="levelSelect"></select></label>
      <label>Go to Board <input id="manualLevel" value="PST-004" aria-label="Manual board ID" /></label>
      <button id="loadBtn" type="button">Load Board</button>
      <button id="homeBtn" type="button" class="secondary">Splash</button>
      <span class="sf-score" id="scoreReadout">Score: 0</span>
      <a class="secondary" id="openRaw" href="Signal_Flow_v1_41_16_IR_NORMAL_LEVEL_FLOW_FIX.html" target="_blank" rel="noopener">Open Raw Build</a>
      <div class="sf-hint">v1.41.18 distributed IR wrapper</div>
    </nav>
    <main class="sf-frame-wrap"><iframe id="gameFrame" title="Signal Flow Game"></iframe></main>
  </div>
  <script>
  (function(){
    const GAME = 'Signal_Flow_v1_41_16_IR_NORMAL_LEVEL_FLOW_FIX.html';
    const IR_RUNNER = 'ir-level-runner.html';
    const LEVELS = {
      REC:[
        'REC-001','REC-002','REC-003','REC-004','REC-IR-01',
        'REC-006','REC-007','REC-008','REC-009','REC-010',
        'REC-011','REC-012','REC-013','REC-IR-02','REC-015',
        'REC-016','REC-017','REC-018','REC-019','REC-020',
        'REC-021','REC-022','REC-023','REC-IR-03','REC-025',
        'REC-026','REC-027','REC-028','REC-029','REC-030',
        'REC-031','REC-032','REC-033','REC-IR-04','REC-035',
        'REC-036','REC-037','REC-038','REC-039','REC-040',
        'REC-041','REC-042','REC-043','REC-044','REC-045',
        'REC-046','REC-047','REC-048','REC-049','REC-050'
      ],

      LIV:[
        'LIV-001','LIV-002','LIV-003','LIV-004','LIV-IR-01',
        'LIV-006','LIV-007','LIV-008','LIV-009','LIV-010',
        'LIV-011','LIV-012','LIV-013','LIV-IR-02','LIV-015',
        'LIV-016','LIV-017','LIV-018','LIV-019','LIV-020',
        'LIV-021','LIV-022','LIV-023','LIV-IR-03','LIV-025',
        'LIV-026','LIV-027','LIV-028','LIV-029','LIV-030',
        'LIV-031','LIV-032','LIV-033','LIV-034','LIV-IR-04',
        'LIV-036','LIV-037','LIV-038','LIV-039','LIV-040',
        'LIV-041','LIV-042','LIV-043','LIV-044','LIV-045',
        'LIV-IR-05','LIV-047','LIV-048','LIV-049','LIV-050'
      ],

      BRD:[
        'BRD-001','BRD-002','BRD-003','BRD-004','BRD-IR-01',
        'BRD-006','BRD-007','BRD-008','BRD-009','BRD-010',
        'BRD-011','BRD-IR-02','BRD-013','BRD-014','BRD-015',
        'BRD-016','BRD-017','BRD-018','BRD-019','BRD-020',
        'BRD-021','BRD-022','BRD-023','BRD-IR-03','BRD-025',
        'BRD-026','BRD-027','BRD-028','BRD-029','BRD-030',
        'BRD-031','BRD-032','BRD-033','BRD-034','BRD-035',
        'BRD-036','BRD-IR-04','BRD-038','BRD-039','BRD-040',
        'BRD-041','BRD-042','BRD-043','BRD-044','BRD-045',
        'BRD-046','BRD-047','BRD-048','BRD-049','BRD-050'
      ],

      PST:[
        'PST-001','PST-002','PST-003','PST-004','PST-IR-01',
        'PST-006','PST-007','PST-008','PST-009','PST-010',
        'PST-011','PST-012','PST-013','PST-IR-02','PST-015',
        'PST-016','PST-017','PST-018','PST-019','PST-020',
        'PST-021','PST-022','PST-023','PST-IR-03','PST-025',
        'PST-026','PST-027','PST-028','PST-029','PST-030',
        'PST-031','PST-032','PST-033','PST-034','PST-IR-04',
        'PST-036','PST-037','PST-038','PST-039','PST-040',
        'PST-041','PST-042','PST-043','PST-044','PST-045',
        'PST-IR-05','PST-047','PST-048','PST-049','PST-050'
      ],

      GAM:[
        'GAM-001','GAM-002','GAM-003','GAM-004','GAM-IR-01',
        'GAM-006','GAM-007','GAM-008','GAM-009','GAM-010',
        'GAM-011','GAM-012','GAM-013','GAM-IR-02','GAM-015',
        'GAM-016','GAM-017','GAM-018','GAM-019','GAM-020',
        'GAM-021','GAM-022','GAM-023','GAM-024','GAM-IR-03',
        'GAM-026','GAM-027','GAM-028','GAM-029','GAM-030',
        'GAM-031','GAM-032','GAM-033','GAM-034','GAM-035',
        'GAM-036','GAM-IR-04','GAM-038','GAM-039','GAM-040',
        'GAM-041','GAM-042','GAM-043','GAM-044','GAM-045',
        'GAM-046','GAM-047','GAM-IR-05','GAM-049','GAM-050'
      ]
    };
    const IR_IDS = new Set(Object.values(LEVELS).flat().filter(id => id.includes('-IR-')));

    const PUBLIC_LABELS = {};
    const INTERNAL_BY_PUBLIC = {};

    Object.keys(LEVELS).forEach(env => {
      LEVELS[env].forEach((id, index) => {
        const publicId = env + '-' + String(index + 1).padStart(3, '0');
        PUBLIC_LABELS[id] = id.includes('-IR-') ? publicId : id;
        INTERNAL_BY_PUBLIC[publicId] = id;
        INTERNAL_BY_PUBLIC[id] = id;
      });
    });

    function displayLabel(id){
      return PUBLIC_LABELS[id] || id;
    }

    function internalId(input){
      const clean = String(input || '').trim().toUpperCase();
      return INTERNAL_BY_PUBLIC[clean] || clean;
    }
    const PROGRESS_KEY = 'signal_flow_progress_v36';
    const frame = document.getElementById('gameFrame'); const envSelect = document.getElementById('envSelect'); const levelSelect = document.getElementById('levelSelect'); const manualLevel = document.getElementById('manualLevel'); const scoreReadout = document.getElementById('scoreReadout');
    let currentScore = 0;
    function updateScore(points){
      currentScore = Number(points || 0);
      scoreReadout.textContent = 'Score: ' + currentScore;
    }
    function defaultProgress(){ return { completedLevels: [], unlockedRewards: [], unlockedMics: [] }; }
    function loadProgress(){
      try{
        const raw = localStorage.getItem(PROGRESS_KEY);
        const parsed = raw ? JSON.parse(raw) : defaultProgress();
        return {
          completedLevels: Array.isArray(parsed.completedLevels) ? parsed.completedLevels : [],
          unlockedRewards: Array.isArray(parsed.unlockedRewards) ? parsed.unlockedRewards : [],
          unlockedMics: Array.isArray(parsed.unlockedMics) ? parsed.unlockedMics : []
        };
      }catch{ return defaultProgress(); }
    }
    function saveProgress(progress){
      try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress || defaultProgress())); }catch{}
    }
    function recordCompletion(id){
      const progress = loadProgress();
      if(id && !progress.completedLevels.includes(id)){
        progress.completedLevels.push(id);
        saveProgress(progress);
      }
    }
    updateScore(0);
    function populate(env){
      const ids = LEVELS[env] || LEVELS.PST;
      levelSelect.innerHTML = '';
      ids.forEach(id => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = displayLabel(id);
        levelSelect.appendChild(opt);
      });
      if(!ids.includes(levelSelect.value)) levelSelect.value = ids[0];
    }

    function routeFor(id){
      return IR_IDS.has(id)
        ? IR_RUNNER + '?level=' + encodeURIComponent(id) + '&display=' + encodeURIComponent(displayLabel(id))
        : GAME + '#/level/' + encodeURIComponent(id);
    }

    function loadLevel(id){
      const clean = internalId(id);
      if(!clean) return;
      manualLevel.value = displayLabel(clean);
      const prefix = clean.split('-')[0];
      if(LEVELS[prefix]){
        envSelect.value = prefix;
        populate(prefix);
        if(Array.from(levelSelect.options).some(o => o.value === clean)) levelSelect.value = clean;
      }
      updateScore(0);
      frame.src = routeFor(clean);
    }
    function nextLevel(){ const ids=LEVELS[envSelect.value]||LEVELS.PST; const cur=internalId(manualLevel.value); const idx=ids.indexOf(cur); loadLevel(ids[(idx+1+ids.length)%ids.length]); }
    envSelect.addEventListener('change',()=>{ populate(envSelect.value); manualLevel.value=levelSelect.value; loadLevel(levelSelect.value); });
    levelSelect.addEventListener('change',()=>{ manualLevel.value=levelSelect.value; loadLevel(levelSelect.value); });
    document.getElementById('loadBtn').addEventListener('click',()=>loadLevel(manualLevel.value));
    manualLevel.addEventListener('keydown',ev=>{ if(ev.key==='Enter') loadLevel(manualLevel.value); });
    document.getElementById('homeBtn').addEventListener('click',()=>{ frame.src=GAME; });
    window.addEventListener('message',ev=>{ const msg=ev.data||{}; if(msg.type==='sf-ir-complete'){ updateScore(msg.points); recordCompletion(msg.levelId); } if(msg.type==='sf-ir-next') nextLevel(); if(msg.type==='sf-ir-choose'){ envSelect.focus(); } });
    populate('PST'); loadLevel('PST-IR-01');
  })();
  </script>



<script id="sf-brief-todo-attention-runtime-script-v4">
(function () {
  if (window.sfBriefTodoAttentionV4Installed) return;
  window.sfBriefTodoAttentionV4Installed = true;

  const HEADING_RE = /^(level brief|brief|objective|objectives|to[-\s]?do|tasks?|checklist)\b/i;
  const TEXT_RE = /\b(level brief|brief|objective|objectives|to[-\s]?do|tasks?|checklist|patch this|route|connect|signal path)\b/i;
  const WRAPPER_RE = /sidebar|column|left-col|leftcol|layout|wrapper|container|nav|shell|app|main/i;
  const CARD_RE = /brief|todo|to-do|task|checklist|objective|mission|panel|card/i;

  function ensureStyle(doc) {
    if (!doc || doc.getElementById("sf-brief-todo-attention-runtime-v4")) return;
    const style = doc.createElement("style");
    style.id = "sf-brief-todo-attention-runtime-v4";
    style.textContent = document.getElementById("sf-brief-todo-attention-runtime-v4") ? document.getElementById("sf-brief-todo-attention-runtime-v4").textContent : "";
    doc.head.appendChild(style);
  }

  function rectOf(el) {
    return el.getBoundingClientRect();
  }

  function visible(el) {
    const r = rectOf(el);
    return r.width > 80 && r.height > 28;
  }

  function leftSide(el, win) {
    const r = rectOf(el);
    return r.left < Math.max(430, win.innerWidth * 0.48);
  }

  function classId(el) {
    return String(el.className || "") + " " + String(el.id || "");
  }

  function textOf(el) {
    return (el.innerText || el.textContent || "").trim();
  }

  function tooBroad(el, win) {
    const r = rectOf(el);
    const ci = classId(el);
    const text = textOf(el);
    if (WRAPPER_RE.test(ci) && !CARD_RE.test(ci)) return true;
    if (r.width > Math.min(620, win.innerWidth * 0.54)) return true;
    if (r.height > Math.min(430, win.innerHeight * 0.62)) return true;
    if ((text.match(/\b(brief|objective|to[-\s]?do|task|checklist)\b/gi) || []).length > 4) return true;
    return false;
  }

  function cardFor(el, win) {
    let best = el;

    for (let node = el; node && node !== node.ownerDocument.body; node = node.parentElement) {
      const r = rectOf(node);
      const ci = classId(node);

      if (!visible(node) || !leftSide(node, win)) continue;
      if (tooBroad(node, win)) break;

      if (
        CARD_RE.test(ci) ||
        (r.width >= 150 && r.width <= 560 && r.height >= 42 && r.height <= 360)
      ) {
        best = node;
      }
    }

    return best;
  }

  function score(el, win) {
    const text = textOf(el);
    if (!text || !TEXT_RE.test(text)) return 0;
    if (!visible(el) || !leftSide(el, win)) return 0;
    if (tooBroad(el, win)) return 0;

    const r = rectOf(el);
    const ci = classId(el);
    let s = 1;

    if (HEADING_RE.test(text)) s += 8;
    if (CARD_RE.test(ci)) s += 6;
    if (text.length >= 8 && text.length <= 900) s += 2;
    if (r.width >= 160 && r.width <= 520) s += 2;
    if (r.height >= 42 && r.height <= 320) s += 2;

    return s;
  }

  function applyInDocument(doc, win) {
    if (!doc || !win) return 0;
    ensureStyle(doc);

    doc.querySelectorAll(".sf-brief-todo-attention").forEach(el => {
      el.classList.remove("sf-brief-todo-attention");
    });

    const all = Array.from(doc.querySelectorAll("h1,h2,h3,h4,h5,p,li,div,section,article,ul,ol"));

    const candidates = all
      .map(el => [score(el, win), el])
      .filter(pair => pair[0] > 0)
      .sort((a, b) => b[0] - a[0])
      .map(pair => cardFor(pair[1], win))
      .filter(el => !tooBroad(el, win));

    const unique = [];
    for (const el of candidates) {
      if (!unique.includes(el) && !unique.some(existing => existing.contains(el) || el.contains(existing))) {
        unique.push(el);
      }
      if (unique.length >= 3) break;
    }

    unique.forEach(el => el.classList.add("sf-brief-todo-attention"));
    return unique.length;
  }

  function frames() {
    const out = [];
    document.querySelectorAll("iframe").forEach(frame => {
      try {
        if (frame.contentDocument && frame.contentWindow) out.push([frame.contentDocument, frame.contentWindow]);
      } catch (err) {}
    });
    return out;
  }

  function applyBriefTodoAttention() {
    let count = applyInDocument(document, window);
    frames().forEach(pair => {
      count += applyInDocument(pair[0], pair[1]);
    });
    return count;
  }

  window.sfApplyBriefTodoAttention = applyBriefTodoAttention;

  function schedule(delay) {
    setTimeout(applyBriefTodoAttention, delay);
  }

  document.addEventListener("DOMContentLoaded", () => schedule(80));
  window.addEventListener("load", () => {
    schedule(80);
    schedule(450);
    schedule(1200);
  });
  window.addEventListener("hashchange", () => schedule(180));
  window.addEventListener("popstate", () => schedule(180));

  const observer = new MutationObserver(() => {
    clearTimeout(window.sfBriefTodoAttentionTimer);
    window.sfBriefTodoAttentionTimer = setTimeout(applyBriefTodoAttention, 180);
  });

  observer.observe(document.documentElement, {
    childList: true,
    subtree: true,
    characterData: true
  });

  schedule(180);
  schedule(900);
})();
</script>
